openapi: "3.0.0"
info:
  title: Focus Mode API Gateway
  version: "1.0"
  description: |
    Routes frontend requests to Lambda functions.

    AUTH — KHÔNG dùng JWT authorizer của API Gateway: access_token Supabase của project
    này ký ES256 (asymmetric), JWT authorizer NATIVE của HTTP API chỉ hỗ trợ RS256 → sẽ
    từ chối mọi request hợp lệ. Auth thực hiện TRONG từng Lambda (lấy Bearer token, gọi
    Supabase PostgREST verify + RLS) — pattern đã chạy thật ở ambient-audio-manager,
    agent-bff, agent-action-handler. Route admin (/embed, /embed-all) thì Lambda tự check
    role='admin'. Không có securityScheme/authorizer nào trong file này — đừng thêm lại
    kiểu JWT authorizer, nó không hoạt động với token ES256 của project này.

    Trạng thái deploy: /agent/chat + 2 route /ambient/* + /emotion đang chạy thật (HTTP
    API ffepnb6gei). /rag, /embed, /embed-all CÓ CODE (aws/lambdas/rag-recommender,
    aws/lambdas/admin-vectorizer) nhưng CHƯA deploy — xem DEPLOY-cmd.md của từng lambda.

servers:
  - url: https://${API_ID}.execute-api.ap-southeast-1.amazonaws.com/prod

paths:
  /agent/chat:
    post:
      summary: Send message to Bedrock Task Agent
      operationId: agentChat
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT}:function:agent-bff/invocations
        httpMethod: POST
        type: aws_proxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inputText]
              properties:
                sessionId: { type: string }
                inputText: { type: string }
      responses:
        '200':
          description: Agent response
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId: { type: string }
                  responseText: { type: string }

  /emotion:
    post:
      summary: Detect emotion from journal text (DistilBERT ONNX, packaged in Lambda)
      operationId: detectEmotion
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT}:function:emotion-detector/invocations
        httpMethod: POST
        type: aws_proxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string, maxLength: 1000, description: Journal text to classify }
      responses:
        '200':
          description: Emotion label + confidence (stateless — Lambda does not write to Supabase; frontend saves it with the session)
          content:
            application/json:
              schema:
                type: object
                properties:
                  label: { type: string, description: "One of focused, stressed, exhausted, relaxed, unmotivated" }
                  confidence: { type: number }

  /rag:
    post:
      summary: Get content recommendations based on emotion (Bedrock Cohere Embed Multilingual v3 + pgvector RPC)
      operationId: getRecommendations
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT}:function:rag-recommender/invocations
        httpMethod: POST
        type: aws_proxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emotion]
              properties:
                emotion: { type: string, description: "One of focused, stressed, exhausted, relaxed, unmotivated" }
                limit: { type: integer, default: 3 }
      responses:
        '200':
          description: Flat array of similar media_library rows (empty array if nothing embedded yet)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    title: { type: string }
                    content_text: { type: string }
                    content_url: { type: string }
                    type: { type: string }
                    source: { type: string }
                    similarity: { type: number }

  /embed:
    post:
      summary: Generate embedding for one existing media item (admin only, Bedrock Cohere Embed Multilingual v3)
      operationId: embedMedia
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT}:function:admin-vectorizer/invocations
        httpMethod: POST
        type: aws_proxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mediaId]
              properties:
                mediaId: { type: string, description: "UUID of an existing public.media_library row (created separately via useDataService.createMedia)" }
      responses:
        '200':
          description: Embedding written
          content:
            application/json:
              schema:
                type: object
                properties:
                  mediaId: { type: string }
                  dimensions: { type: integer }

  /embed-all:
    post:
      summary: Generate embeddings for every media item still missing one (admin only, capped per call)
      operationId: embedAllMedia
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT}:function:admin-vectorizer/invocations
        httpMethod: POST
        type: aws_proxy
      responses:
        '200':
          description: Number of items embedded in this call (call again if it returns MAX_BATCH, meaning more may remain)
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }

  /ambient/upload-url:
    post:
      summary: Get presigned S3 PUT URL for an ambient audio upload (admin UI)
      operationId: ambientUploadUrl
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT}:function:ambient-audio-manager/invocations
        httpMethod: POST
        type: aws_proxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename]
              properties:
                filename: { type: string }
                contentType: { type: string }
      responses:
        '200':
          description: Presigned upload URL + public URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploadUrl: { type: string }
                  publicUrl: { type: string }
                  key: { type: string }

  /ambient/files:
    get:
      summary: List ambient audio files in the S3 bucket (admin UI)
      operationId: ambientListFiles
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT}:function:ambient-audio-manager/invocations
        httpMethod: POST
        type: aws_proxy
      responses:
        '200':
          description: List of audio files with public URLs
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        url: { type: string }
                        size: { type: integer }
                        lastModified: { type: string }
