openapi: "3.0.0"
info:
  title: Focus Mode API Gateway
  version: "1.0"
  description: |
    Routes frontend requests to Lambda functions.

    ⚠️ AUTH — QUAN TRỌNG: access_token Supabase của project này ký ES256 (asymmetric
    signing keys). JWT authorizer NATIVE của HTTP API chỉ hỗ trợ RS256 → KHÔNG verify
    được token ES256. Vì vậy block x-amazon-apigateway-authorizer bên dưới KHÔNG được
    dùng cho deploy thật; auth được thực hiện TRONG từng Lambda (lấy Bearer token, gọi
    Supabase PostgREST verify + RLS) — pattern đã chạy thật ở ambient-audio-manager và
    agent-bff. Với route admin (/admin/vectorize) thì Lambda tự check role='admin'.

    Trạng thái deploy: chỉ 2 route /ambient/* đang chạy (HTTP API ffepnb6gei, route
    $default -> ambient-audio-manager, KHÔNG authorizer). Các route còn lại là spec đích.

servers:
  - url: https://${API_ID}.execute-api.ap-southeast-1.amazonaws.com/prod

security:
  - jwtAuth: []

paths:
  /agent/chat:
    post:
      summary: Send message to Bedrock Task Agent
      operationId: agentChat
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT}:function:agent-bff/invocations
        httpMethod: POST
        type: aws_proxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inputText]
              properties:
                sessionId: { type: string }
                inputText: { type: string }
      responses:
        '200':
          description: Agent response
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId: { type: string }
                  responseText: { type: string }

  /emotion/detect:
    post:
      summary: Detect emotion from journal text
      operationId: detectEmotion
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT}:function:focus-emotion-detector/invocations
        httpMethod: POST
        type: aws_proxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [journal_text]
              properties:
                journal_text: { type: string, maxLength: 1000 }
                session_id: { type: string }
      responses:
        '200':
          description: Emotion label + confidence
          content:
            application/json:
              schema:
                type: object
                properties:
                  emotion_label: { type: string }
                  confidence: { type: number }

  /report:
    post:
      summary: Generate daily Markdown report
      operationId: generateReport
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT}:function:focus-report-generator/invocations
        httpMethod: POST
        type: aws_proxy
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: { type: string }
                date: { type: string, format: date }
                send_email: { type: boolean }
      responses:
        '200':
          description: Report generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  markdown_url: { type: string }
                  pdf_url: { type: string }
                  email_sent: { type: boolean }

  /rag/recommend:
    post:
      summary: Get content recommendations based on emotion
      operationId: getRecommendations
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT}:function:focus-rag-recommender/invocations
        httpMethod: POST
        type: aws_proxy
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                emotion: { type: string }
                limit: { type: integer }
      responses:
        '200':
          description: Ranked recommendations

  /admin/vectorize:
    post:
      summary: Generate embedding for media item (admin only)
      operationId: vectorizeMedia
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT}:function:focus-admin-vectorize/invocations
        httpMethod: POST
        type: aws_proxy
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [title, content_text]
              properties:
                title: { type: string }
                content_text: { type: string }
                type: { type: string }
                source: { type: string }
                tags: { type: array, items: { type: string } }
      responses:
        '200':
          description: Embedding generated

  /ambient/upload-url:
    post:
      summary: Get presigned S3 PUT URL for an ambient audio upload (admin UI)
      operationId: ambientUploadUrl
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT}:function:ambient-audio-manager/invocations
        httpMethod: POST
        type: aws_proxy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename]
              properties:
                filename: { type: string }
                contentType: { type: string }
      responses:
        '200':
          description: Presigned upload URL + public URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploadUrl: { type: string }
                  publicUrl: { type: string }
                  key: { type: string }

  /ambient/files:
    get:
      summary: List ambient audio files in the S3 bucket (admin UI)
      operationId: ambientListFiles
      x-amazon-apigateway-integration:
        uri: arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT}:function:ambient-audio-manager/invocations
        httpMethod: POST
        type: aws_proxy
      responses:
        '200':
          description: List of audio files with public URLs
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        url: { type: string }
                        size: { type: integer }
                        lastModified: { type: string }

components:
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      x-amazon-apigateway-authorizer:
        type: jwt
        jwtConfiguration:
          issuer: https://${SUPABASE_PROJECT}.supabase.co/auth/v1
          audience: [authenticated]
