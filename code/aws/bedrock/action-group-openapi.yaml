openapi: "3.0.0"
info:
  title: To-Do Manager API
  description: Action Group for Bedrock Task Manager Agent
  version: "1.0"

paths:
  /create-task:
    post:
      summary: Create a new task
      description: Create a new to-do task for the current authenticated user. Use this when the user wants to add or create a task.
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  description: Task title
                description:
                  type: string
                  description: Optional task description
                dueDate:
                  type: string
                  format: date
                  description: Due date in YYYY-MM-DD format
                priority:
                  type: integer
                  minimum: 0
                  maximum: 3
                  description: "Priority 0=none, 1=low, 2=medium, 3=high"
      responses:
        "200":
          description: Task created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Human-readable result message
                  status:
                    type: string
                    description: "success or error"

  /update-task:
    put:
      summary: Update an existing task
      description: Update fields of an existing task owned by the current user. Use this when the user wants to change a task's title, description, status, or priority.
      operationId: updateTask
      parameters:
        - name: taskId
          in: query
          required: true
          description: UUID of the task to update
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: New task title
                description:
                  type: string
                  description: New task description
                status:
                  type: string
                  enum: [pending, in_progress, completed, cancelled]
                  description: New task status
                priority:
                  type: integer
                  minimum: 0
                  maximum: 3
                  description: "Priority 0=none, 1=low, 2=medium, 3=high"
      responses:
        "200":
          description: Task updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Human-readable result message
                  status:
                    type: string
                    description: "success or error"

  /delete-task:
    delete:
      summary: Delete a task
      description: Delete a task owned by the current user. Use this only when the user explicitly wants to remove or delete a task.
      operationId: deleteTask
      parameters:
        - name: taskId
          in: query
          required: true
          description: UUID of the task to delete
          schema:
            type: string
      responses:
        "200":
          description: Task deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Human-readable result message
                  status:
                    type: string
                    description: "success or error"
